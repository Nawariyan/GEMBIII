<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 1 Year Anniversary 💖</title>
    <!-- Added Dancing Script for the handwritten look -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,500;1,700&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfaf7;
            --primary-accent: #f8c8dc; 
            --secondary-accent: #e0ac9a; 
            --text-main: #332121;
            --text-light: #5e4747;
            --gold: #d4af37;
            --cream: #fffaf0;
            --ease-in-out-quint: cubic-bezier(0.83, 0, 0.17, 1);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Handwritten font for Hero section */
        .handwritten { font-family: 'Dancing Script', cursive; }
        .script-font { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 500; }

        /* --- GLOBAL BACKGROUND HEARTS --- */
        #bg-heart-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .global-blur-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7); /* White blur background */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: -1;
            pointer-events: none;
        }

        /* --- LOCK SCREEN --- */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fef4f8 0%, #fffaf0 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s var(--ease-in-out-quint), visibility 1s;
        }

        #hidden-pin-input {
            position: absolute;
            opacity: 0;
            top: -1000px;
            left: -1000px;
        }

        .lock-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(224, 172, 154, 0.15);
            border: 1px solid rgba(248, 200, 220, 0.4);
            max-width: 380px;
            width: 85%;
            position: relative;
            z-index: 2002;
            cursor: pointer;
        }

        .lock-title { font-size: 1.8rem; margin-bottom: 10px; color: var(--text-main); }
        .lock-subtitle { font-size: 0.9rem; color: var(--text-light); margin-bottom: 30px; letter-spacing: 1px; }

        .pin-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--secondary-accent);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .pin-dot.filled {
            background-color: var(--secondary-accent);
            transform: scale(1.1);
        }

        #runaway-btn {
            position: absolute;
            padding: 14px 32px;
            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
            transition: transform 0.1s ease, top 0.2s ease, left 0.2s ease, background-color 0.3s ease;
            z-index: 2005;
            white-space: nowrap;
        }

        /* --- HERO SECTION --- */
        #hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 0 20px;
            box-sizing: border-box;
            background: transparent; /* Changed to show bg hearts */
        }

        .hero-title {
            font-size: 4rem; /* Slightly larger for handwriting */
            line-height: 1.3;
            margin-bottom: 15px;
            color: var(--text-main);
            opacity: 0;
            animation: fadeIn 1.5s forwards 0.5s;
        }

        .hero-topic-font {
            color: #ff4d6d;
        }

        .hero-date {
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 40px;
            font-weight: 500;
            opacity: 0;
            animation: fadeIn 1s forwards 1.2s;
        }

        .btn-romance {
            padding: 15px 40px;
            background-color: transparent;
            border: 2px solid var(--secondary-accent);
            color: var(--secondary-accent);
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            opacity: 0;
            animation: fadeIn 1s forwards 1.8s;
            display: inline-block;
        }

        /* --- LIVE COUNTER --- */
        #counter-section {
            padding: 100px 20px;
            background-color: rgba(255, 255, 255, 0.4);
            text-align: center;
        }
        .counter-title { font-size: 2.2rem; margin-bottom: 40px; color: var(--secondary-accent); }
        .countdown-container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .time-box {
            background: rgba(255, 250, 240, 0.95);
            padding: 25px 35px;
            border-radius: 15px;
            min-width: 110px;
            box-shadow: 0 10px 30px rgba(224, 172, 154, 0.1);
            border: 1px solid rgba(248, 200, 220, 0.2);
        }

        /* --- TYPING SECTION --- */
        #typing-section {
            padding: 120px 20px;
            position: relative;
            background-color: rgba(255, 241, 242, 0.5); 
        }

        #typing-container {
            max-width: 950px;
            margin: 0 auto;
            position: relative;
            z-index: 3; 
            padding: 40px;
        }

        #message-area {
            font-size: 1.25rem;
            line-height: 2;
            color: var(--text-main);
            text-align: left;
            min-height: 400px;
        }

        .word {
            display: inline-block;
            margin-right: 6px;
            opacity: 0;
            filter: blur(6px);
            transform: scale(0.95);
            transition: opacity 0.25s ease-out, filter 0.25s ease-out, transform 0.25s ease-out;
        }
        .word.revealed { opacity: 1; filter: blur(0px); transform: scale(1); }

        /* Updated Centered Text in Paragraph */
        .centered-love-block {
            display: block;
            text-align: center;
            margin: 35px auto;
            width: 100%;
            font-weight: 800; /* More bold */
            color: #ff4d6d;
            font-family: 'Poppins', sans-serif; /* Same font as rest of para */
            letter-spacing: 1px;
        }

        #cursor {
            display: inline-block;
            width: 3px;
            height: 1.4rem;
            background-color: #ff4d6d;
            animation: blink 0.8s infinite;
        }

        /* --- GALLERY --- */
        #gallery-section {
            padding: 100px 20px 140px 20px;
            background-color: transparent;
            text-align: center;
        }

        .giant-heart-wrapper {
            position: relative;
            width: 100%;
            max-width: 680px;
            height: 600px;
            margin: 0 auto;
        }

        .heart-photo-node {
            position: absolute;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            border: 3px solid #fff;
            opacity: 0;
            filter: blur(15px);
            transform: scale(0.8);
            transition: opacity 1.5s cubic-bezier(0.1, 0.8, 0.2, 1), 
                        filter 1.5s cubic-bezier(0.1, 0.8, 0.2, 1), 
                        transform 1.5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .heart-photo-node.revealed-node { opacity: 1; filter: blur(0px); transform: scale(1); }

        /* --- NOTES --- */
        #notes {
            padding: 50px 20px 100px 20px;
            text-align: center;
        }
        
        #card-display-area {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 350px;
            perspective: 1000px;
        }

        #note-card {
            width: 500px;
            height: 300px;
            position: relative;
            cursor: pointer;
            transition: transform 0.8s var(--ease-in-out-quint), opacity 0.5s ease;
            transform-style: preserve-3d;
            border-radius: 20px;
            opacity: 0;
            transform: translateY(20px) rotateY(180deg);
        }
        #note-card.active { opacity: 1; transform: translateY(0) rotateY(180deg); }
        #note-card.revealed { transform: translateY(0) rotateY(0deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 15px 40px rgba(224, 172, 154, 0.15);
            border: 1px solid rgba(248, 200, 220, 0.3);
            background: white;
        }
        .card-back { background: linear-gradient(135deg, #fef4f8 0%, #fffcf5 100%); transform: rotateY(180deg); }

        /* --- SNIPPETS & DATE --- */
        #special-snippets {
            padding: 50px 20px 120px 20px;
            text-align: center;
        }
        .snippet-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 25px;
            max-width: 900px;
            margin: 0 auto;
        }
        .snippet-card {
            background: white;
            padding: 15px;
            border-radius: 24px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.08);
            flex: 1;
        }
        .snippet-img { width: 100%; border-radius: 16px; display: block; }
        
        .bottom-date-container {
            margin-top: 40px;
            font-size: 1.5rem;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 2px;
        }

        /* ANIMATIONS */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        @media screen and (max-width: 768px) {
            .hero-title { font-size: 2.8rem; }
            .snippet-container { flex-direction: column; }
            #note-card { width: 95%; }
            .giant-heart-wrapper { transform: scale(0.6); transform-origin: top center; height: 350px; }
        }
    </style>
</head>

    <script>
        // --- LOCK SCREEN LOGIC ---
        const targetPin = "28052025";
        let pinUnlocked = false;
        const runawayBtn = document.getElementById('runaway-btn');
        const pinInput = document.getElementById('hidden-pin-input');

        function focusInputField() { if(!pinUnlocked) pinInput.focus(); }
        window.addEventListener('load', focusInputField);

        pinInput.addEventListener('input', (e) => {
            let currentVal = e.target.value.replace(/\D/g, ''); 
            updateDots(currentVal.length);
            if (currentVal === targetPin) {
                unlock(true);
            } else if (currentVal.length === 8) {
                document.getElementById('lock-box').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('lock-box').classList.remove('shake');
                    pinInput.value = "";
                    updateDots(0);
                }, 400);
            }
        });

        function updateDots(length) {
            for (let i = 0; i < 8; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.classList.toggle('filled', i < length);
            }
        }

        function unlock(isTrue) {
            pinUnlocked = isTrue;
            runawayBtn.innerHTML = "🔓 ENTER NOW BABY";
            runawayBtn.style.backgroundColor = "#2a9d8f";
            runawayBtn.style.top = '15%'; 
            runawayBtn.style.left = '50%';
            runawayBtn.style.transform = 'translateX(-50%)';
        }

        runawayBtn.addEventListener('click', () => {
            if (pinUnlocked) {
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lock-screen').style.visibility = 'hidden';
                    initGlobalHearts();
                }, 1000);
            }
        });

        // Runaway logic
        runawayBtn.addEventListener('mouseenter', () => {
            if (pinUnlocked) return;
            runawayBtn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
            runawayBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
        });

        // --- GLOBAL HEART CANVAS ---
        let canvas, ctx, heartsArray = [];
        function initGlobalHearts() {
            canvas = document.getElementById('bg-heart-canvas');
            ctx = canvas.getContext('2d');
            resize();
            window.addEventListener('resize', resize);
            for (let i = 0; i < 50; i++) heartsArray.push(new Heart());
            animate();
        }
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        class Heart {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.size = Math.random() * 15 + 10;
                this.speed = Math.random() * 1 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y -= this.speed;
                if (this.y < -20) this.reset();
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ff4d6d';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.bezierCurveTo(this.x-this.size/2, this.y-this.size/2, this.x-this.size, this.y+this.size/3, this.x, this.y+this.size);
                ctx.bezierCurveTo(this.x+this.size, this.y+this.size/3, this.x+this.size/2, this.y-this.size/2, this.x, this.y);
                ctx.fill();
            }
        }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            heartsArray.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(animate);

        function setupMessage() {
            const container = document.getElementById('typed-content');
            container.innerHTML = '';
            ParagraphMainText.split(/(\s+)/).forEach(token => {
                let span = document.createElement('span');
                if (token.trim() === '') { span.innerHTML = token.replace(/\n/g, '<br>'); }
                else { span.className = 'word'; span.innerText = token; }
                container.appendChild(span);
            });
            ParagraphCenteredDeclarations.forEach(text => {

        function startTyping() {
            setupMessage();
            const words = document.querySelectorAll('.word');

                if(i < words.length) { words[i++].classList.add('revealed'); setTimeout(next, 30); }

            }
            next();

        // Intersection Observers
        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    if(e.target.id === 'typing-container') startTyping();
                    if(e.target.id === 'collage-heart-container') {
                        document.querySelectorAll('.heart-photo-node').forEach((n, idx) => {

        }, {threshold: 0.1});
